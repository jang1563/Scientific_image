name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Node 24 verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Static checks
        run: |
          node --check bin/scientific-image-mcp.js
          node --check bin/scientific-image-mcp-doctor.js
          node --check apps/web/src/app.js
          node --check scripts/serve-static.ts
          node --check scripts/build-npm-package.ts
          node --check scripts/portfolio-metrics.ts
          node --check scripts/reviewer-status.ts
          node --check scripts/npm-package-readiness.ts
          node --check scripts/public-readiness-audit.ts

      - name: Portfolio metrics
        run: node scripts/portfolio-metrics.ts

      - name: Reviewer status
        run: node scripts/reviewer-status.ts --skip-tests

      - name: npm package readiness
        run: node scripts/npm-package-readiness.ts

      - name: Public readiness audit
        run: node scripts/public-readiness-audit.ts

      - name: Public example freshness
        run: |
          node scripts/generate-public-examples.ts
          git diff --exit-code docs/examples

      - name: Test suite
        run: node --test tests/*.test.ts
